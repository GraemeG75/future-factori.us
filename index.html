<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future Factorius</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0f;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #ui-hud {
        position: absolute;
        top: 16px;
        left: 16px;
        pointer-events: auto;
      }
      #ui-menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="ui-hud"></div>
      <div id="ui-menu"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
